name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "cmake;3.22.1" \
            "ndk;27.1.12297006"

      - name: Create backend env
        run: printf 'BACKEND_BASE_URL=http://127.0.0.1:8080\n' > .env.production

      - name: Run unit tests
        run: ./gradlew --no-daemon test

